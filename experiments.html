  <script src="js/particles.js"></script>
  <script>
    // Preview canvas — simplified Neural Pulse
    (function() {
      var c = document.getElementById('preview-canvas');
      var wrap = c.parentElement;
      var dpr = window.devicePixelRatio || 1;
      function resize() {
        var w = wrap.clientWidth;
        var h = wrap.clientHeight;
        c.style.width = w + 'px';
        c.style.height = h + 'px';
        c.width = w * dpr;
        c.height = h * dpr;
      }
      resize();
      var ctx = c.getContext('2d');

      var particles = [];
      for (var i = 0; i < 80; i++) {
        var angle = Math.random() * Math.PI * 2;
        particles.push({
          baseR: 40 + Math.random() * 100, angle: angle,
          speed: 0.3 + Math.random() * 0.7, size: 1 + Math.random() * 2.5,
          phase: Math.random() * Math.PI * 2, hue: 215 + Math.random() * 50
        });
      }

      function draw(t) {
        var w = c.width / dpr, h = c.height / dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, w, h);
        var cx = w / 2, cy = h / 2;
        var pulse = Math.sin(t * 0.002) * 0.3 + 1;

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          var r = p.baseR * pulse + Math.sin(t * 0.003 + p.phase) * 15;
          var a = p.angle + t * 0.0004 * p.speed;
          var x = cx + Math.cos(a) * r;
          var y = cy + Math.sin(a) * r;
          var alpha = 0.2 + Math.sin(t * 0.004 + p.phase) * 0.2;
          ctx.beginPath();
          ctx.arc(x, y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = 'hsla(' + p.hue + ', 50%, 55%, ' + alpha + ')';
          ctx.fill();
        }

        var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50 * pulse);
        glow.addColorStop(0, 'hsla(230, 60%, 55%, 0.2)');
        glow.addColorStop(1, 'hsla(230, 60%, 55%, 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, 50 * pulse, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();
  </script>
